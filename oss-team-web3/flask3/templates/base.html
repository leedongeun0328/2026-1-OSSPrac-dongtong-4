<!DOCTYPE html>
<html lang="ko" data-bs-theme="light">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OSS Project Team{% endblock %}</title>

    <script>
        const savedTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-bs-theme", savedTheme);
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top glass-navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
            <i class="fa-solid fa-user-group me-2"></i>OSS Team dongtong
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link {% if active_page == 'home' %}active{% endif %}" href="{{ url_for('index') }}">
                        홈
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('index') }}#project">
                        프로젝트
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('index') }}#team">
                        팀원
                    </a>
                </li>

                <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                    <button id="themeToggle" class="btn btn-sm btn-outline-secondary rounded-pill">
                        <i id="themeIcon" class="bi bi-moon-stars me-1"></i>
                        <span id="themeText">Dark</span>
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="footer py-4 mt-5">
    <div class="container text-center">
        <p class="mb-1 fw-semibold">Open Source Software Project Team "dongtong"</p>
        <p class="mb-0 small text-secondary">
            © 2026 OSS Team. Built with Flask, Bootstrap, Nginx and Open Source Tools.
        </p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({
        duration: 800,
        once: true
    });
</script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>

</body>
</html>
